<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerzBan | بوابة الوصول</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .bg-glow { position: absolute; width: 300px; height: 300px; background: #00ff41; filter: blur(150px); opacity: 0.1; z-index: 0; }
        
        .card { 
            position: relative; z-index: 1; background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(20px); 
            padding: 40px; border-radius: 30px; border: 1px solid #333; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #00ff41; font-size: 24px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        
        .step { text-align: right; margin-bottom: 20px; font-size: 14px; color: #ccc; }
        .step b { color: #00ff41; }
        
        .btn { 
            display: block; width: 100%; padding: 16px; margin: 15px 0; border-radius: 15px; 
            text-decoration: none; font-weight: bold; transition: 0.4s; cursor: pointer; border: none; font-family: inherit;
        }
        .btn-yt { background: #1a1a1a; border: 1px solid #ff0000; color: #ff0000; }
        .btn-yt:hover { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }
        
        .btn-go { background: #00ff41; color: #000; font-size: 16px; }
        .btn-go:hover { box-shadow: 0 0 20px #00ff41; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="card">
        <h1>ZerzBan Access</h1>
        <div class="step"><b>1.</b> شاهد فيديو شرح الاختصار بدقة.</div>
        <div class="step"><b>2.</b> اتبع الخطوات واختصر الرابط.</div>
        <div class="step"><b>3.</b> سيتم توجيهك فوراً لمولد المفتاح.</div>
        
        <a href="https://youtube.com/shorts/9p48RIKLRu4" target="_blank" class="btn btn-yt">شاهد الفيديو</a>
        <a href="رابط_اختصارك_هنا" class="btn btn-go">الحصول على المفتاح</a>
    </div>
</body>
</html>
